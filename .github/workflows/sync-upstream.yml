name: Sync Upstream

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: helium-sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Rebase local customizations onto upstream
        id: sync
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://github.com/imputnet/helium.git 2>/dev/null || true
          git remote set-url upstream https://github.com/imputnet/helium.git
          git fetch upstream main --tags

          before=$(git rev-parse HEAD)
          git rebase upstream/main
          after=$(git rev-parse HEAD)

          if [ "$before" = "$after" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Push synced branch
        if: steps.sync.outputs.changed == 'true'
        shell: bash
        run: git push --force-with-lease origin HEAD:main
